<script>
if('serviceWorker' in navigator){
  const SW=`
const CACHE='badminton-v1';
self.addEventListener('install',e=>{ self.skipWaiting(); });
self.addEventListener('activate',e=>{ e.waitUntil(self.clients.claim()); });
self.addEventListener('fetch',e=>{
  if(e.request.mode==='navigate'){
    e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{
      return caches.open(CACHE).then(c=>{ c.put(e.request,res.clone()); return res; });
    })));
  }
});`;
  const swBlob=new Blob([SW],{type:'text/javascript'});
  const swUrl=URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}

const { useState, useEffect, useCallback } = React;

// ══════════════════════════════════════════
//  IndexedDB 저장소 (스마트폰 내부 저장)
// ══════════════════════════════════════════
const DB_NAME = 'BadmintonDB', DB_VER = 1, STORE = 'kv';

function openDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(STORE);
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e);
  });
}
async function dbGet(key) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE,'readonly');
    const req = tx.objectStore(STORE).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror   = e => rej(e);
  });
}
async function dbSet(key, val) {
  const db = await openDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(STORE,'readwrite');
    tx.objectStore(STORE).put(val, key);
    tx.oncomplete = () => res();
    tx.onerror    = e => rej(e);
  });
}

const shuffle = arr => {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
};
const THIS_YEAR = new Date().getFullYear();
const toFullYear = by => by<=(THIS_YEAR%100) ? 2000+by : 1900+by;
const calcAge    = by => THIS_YEAR - toFullYear(by) + 1;
const getAgeGroup= by => AGE_GROUPS.find(g=>{ const a=calcAge(by); return a>=g.min&&a<=g.max; })??AGE_GROUPS[3];
const medalColor = r  => ["#FFD700","#C0C0C0","#CD7F32"][r-1]??"#475569";

function balancedSplit(four, getVal) {
  const combos=[[[0,1],[2,3]],[[0,2],[1,3]],[[0,3],[1,2]]];
  let best=combos[0],bestDiff=Infinity;
  combos.forEach(([a,b])=>{
    const d=Math.abs(getVal(four[a[0]])+getVal(four[a[1]])-getVal(four[b[0]])-getVal(four[b[1]]));
    if(d<bestDiff){bestDiff=d;best=[a,b];}
  });
  return {teamA:[four[best[0][0]],four[best[0][1]]],teamB:[four[best[1][0]],four[best[1][1]]]};
}
function ageMixPool(players,mmap){
  const groups=AGE_GROUPS.map(g=>shuffle(players.filter(p=>{const m=mmap[p];if(!m)return false;const a=calcAge(m.birthYear);return a>=g.min&&a<=g.max;})));
  const pool=[];
  for(let i=0;i<Math.ceil(players.length/4);i++){[0,2,1,3].forEach(gi=>{if(groups[gi]?.length)pool.push(groups[gi].shift());});}
  players.forEach(p=>{if(!pool.includes(p))pool.push(p);});
  return pool;
}
function buildSchedule(players,mmap,rounds,pairMode,courtCount){
  const maxC=Math.floor(players.length/4);
  const courts=(courtCount>0&&courtCount<=maxC)?courtCount:maxC;
  return Array.from({length:rounds},()=>{
    const pool=pairMode==="age_mix"?ageMixPool(players,mmap):shuffle(players);
    return Array.from({length:courts},(_,c)=>{
      const four=pool.slice(c*4,c*4+4);
      if(four.length<4)return null;
      let teamA,teamB;
      if(pairMode==="age_balance")     ({teamA,teamB}=balancedSplit(four,p=>calcAge(mmap[p]?.birthYear??74)));
      else if(pairMode==="win_balance")({teamA,teamB}=balancedSplit(four,p=>mmap[p]?.winRate??50));
      else if(pairMode==="age_mix")    {teamA=[four[0],four[2]];teamB=[four[1],four[3]];}
      else                             {teamA=[four[0],four[1]];teamB=[four[2],four[3]];}
      const mA=teamA.map(p=>mmap[p]),mB=teamB.map(p=>mmap[p]);
      return{
        court:c+1,teamA,teamB,scoreA:"",scoreB:"",
        sumAgeA:mA.reduce((s,m)=>s+calcAge(m?.birthYear??74),0),
        sumAgeB:mB.reduce((s,m)=>s+calcAge(m?.birthYear??74),0),
        avgWrA:Math.round(mA.reduce((s,m)=>s+(m?.winRate||0),0)/2),
        avgWrB:Math.round(mB.reduce((s,m)=>s+(m?.winRate||0),0)/2),
      };
    }).filter(Boolean);
  });
}
function calcRankings(players,schedule,mmap){
  const s={};
  players.forEach(p=>{const m=mmap[p]||{};s[p]={name:p,birthYear:m.birthYear,wins:0,losses:0,games:0,pts:0};});
  schedule.forEach(round=>round.forEach(match=>{
    const sa=parseInt(match.scoreA),sb=parseInt(match.scoreB);
    if(isNaN(sa)||isNaN(sb))return;
    const winA=sa>sb;
    match.teamA.forEach(p=>{if(!s[p])return;s[p].games++;s[p].pts+=sa;if(winA)s[p].wins++;else s[p].losses++;});
    match.teamB.forEach(p=>{if(!s[p])return;s[p].games++;s[p].pts+=sb;if(!winA)s[p].wins++;else s[p].losses++;});
  }));
  return Object.values(s).sort((a,b)=>b.wins-a.wins||b.pts-a.pts).map((r,i)=>({...r,rank:i+1}));
}

    cardT:{fontSize:11,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:".06em",marginBottom:11,display:"flex",alignItems:"center",justifyContent:"space-between"},
    cntBadge:{background:"rgba(0,201,167,.12)",color:"#00C9A7",borderRadius:6,padding:"2px 8px",fontSize:11,fontWeight:800},
    inp:{flex:1,background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.09)",borderRadius:8,padding:"10px 11px",color:"#e2e8f0",fontSize:14,outline:"none",WebkitAppearance:"none"},
    addBtn:{background:"linear-gradient(135deg,#00C9A7,#00B4D8)",border:"none",borderRadius:8,padding:"10px 14px",color:"#080d1a",fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"},
    clearBtn:{background:"none",border:"1px solid rgba(255,255,255,.09)",color:"#64748b",borderRadius:6,padding:"4px 9px",fontSize:10,cursor:"pointer"},
    selChip:{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.09)",color:"#cbd5e1",borderRadius:14,padding:"5px 11px",fontSize:12,fontWeight:600,cursor:"pointer"},
    valBadge:{background:"rgba(0,201,167,.12)",color:"#00C9A7",borderRadius:6,padding:"2px 10px",fontWeight:900,fontSize:13},
    gameBtn:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"14px 4px",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:11,cursor:"pointer"},
    gameBtnOn:{background:"rgba(0,201,167,.09)",border:"1px solid rgba(0,201,167,.38)"},
    modeBtn:{display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"14px 8px",background:"rgba(255,255,255,.03)",border:"1px solid rgba(255,255,255,.07)",borderRadius:12,cursor:"pointer"},
    modeBtnOn:{background:"rgba(0,201,167,.07)",border:"1px solid rgba(0,201,167,.35)"},
    mRow:{display:"flex",alignItems:"center",gap:8,padding:"10px 10px",background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.05)",borderRadius:10},
    mRowOn:{background:"rgba(0,201,167,.05)",border:"1px solid rgba(0,201,167,.2)"},
    chkBox:{width:24,height:24,borderRadius:6,border:"1.5px solid rgba(255,255,255,.13)",background:"rgba(255,255,255,.03)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0},
    chkBoxOn:{background:"#00C9A7",border:"1.5px solid #00C9A7"},
    mInfo:{flex:1,textAlign:"left",background:"none",border:"none",cursor:"pointer",padding:0,minWidth:0},
    mName:{fontSize:14,fontWeight:700,color:"#e2e8f0"},
    tag:{borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:800},
    editBtn:{background:"none",border:"none",cursor:"pointer",padding:5,opacity:.5,flexShrink:0},
    delInline:{background:"rgba(255,107,107,.13)",border:"1px solid rgba(255,107,107,.3)",color:"#FF6B6B",borderRadius:5,padding:"2px 7px",fontSize:12,fontWeight:900,cursor:"pointer",lineHeight:1,flexShrink:0},
    rndBadge:{background:"linear-gradient(135deg,#00C9A7,#00B4D8)",color:"#080d1a",borderRadius:5,padding:"3px 9px",fontSize:9,fontWeight:900,letterSpacing:".07em"},
    matchCard:{background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.05)",borderLeft:"3px solid",borderRadius:9,padding:12},
    courtTag:{borderRadius:4,padding:"2px 7px",fontSize:9,fontWeight:800,letterSpacing:".04em"},
    balTag:{background:"rgba(255,230,77,.07)",color:"#FFE66D",borderRadius:4,padding:"2px 7px",fontSize:9,fontWeight:700},
    doneTag:{background:"rgba(0,201,167,.1)",color:"#00C9A7",borderRadius:4,padding:"2px 7px",fontSize:9,fontWeight:700},
    scoreInp:{width:44,height:44,textAlign:"center",background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.1)",borderRadius:8,color:"#fff",fontSize:18,fontWeight:900,outline:"none",WebkitAppearance:"none"},
    winInp:{background:"rgba(0,201,167,.14)",borderColor:"rgba(0,201,167,.48)",color:"#00C9A7"},
    loseInp:{background:"rgba(255,107,107,.08)",borderColor:"rgba(255,107,107,.22)",color:"#FF6B6B"},
    progBar:{height:5,background:"rgba(255,255,255,.06)",borderRadius:3,overflow:"hidden"},
    progFill:{height:"100%",background:"linear-gradient(90deg,#00C9A7,#00B4D8)",borderRadius:3,transition:"width .4s"},
    primBtn:{width:"100%",display:"flex",alignItems:"center",justifyContent:"center",gap:8,padding:"15px 18px",background:"linear-gradient(135deg,#00C9A7,#00B4D8)",border:"none",borderRadius:12,color:"#080d1a",fontSize:15,fontWeight:900,cursor:"pointer",boxShadow:"0 8px 20px rgba(0,201,167,.2)",marginBottom:10},
    empty:{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:10,minHeight:"44vh",textAlign:"center"},
    emptyT:{fontSize:17,fontWeight:900,color:"#e2e8f0"},
    emptyS:{fontSize:13,color:"#475569",lineHeight:1.7,marginBottom:6},
    modalBg:{position:"fixed",inset:0,background:"rgba(0,0,0,.75)",backdropFilter:"blur(6px)",WebkitBackdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:20},
    modal:{background:"#0d1426",border:"1px solid rgba(255,255,255,.1)",borderRadius:16,padding:22,width:"100%",maxWidth:340},
  };

  return(
    <div style={S.root}>
      <div style={S.orb1}/><div style={S.orb2}/>

      {/* 헤더 */}
      <header style={S.hdr}>
        <div style={S.hRow}>
          <div style={S.logoBox}>
            <span style={{fontSize:26}}>🏸</span>
            <div><div style={S.logoT}>배드민턴 매니저</div><div style={S.logoS}>스마트 대진표 · 순위 시스템</div></div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={S.saveBadge}><span>💾</span><span>자동저장</span></div>
            {schedule&&<button onClick={resetAll} style={S.rstBtn}><Ic n="reset" sz={12}/> 초기화</button>}
          </div>
        </div>
        {selected.length>0&&(
          <div style={S.chips}>
            <span style={S.chip}><b style={{color:"#00C9A7"}}>{selected.length}</b>명</span>
            <span style={S.chip}>{courts}코트 · {gameCount}라운드</span>
            <span style={S.chip}>{curMode?.icon} {curMode?.label}</span>
            {schedule&&<span style={S.chip}><b style={{color:"#FFE66D"}}>{done}</b>/{total} 경기</span>}
          </div>
        )}
      </header>

      {/* 탭 */}
      <nav style={S.tabNav}>
        {[{id:"members",label:"참가자",icon:"users"},{id:"setup",label:"설정",icon:"setting"},{id:"bracket",label:"대진표",icon:"list"},{id:"ranking",label:"순위",icon:"trophy"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{...S.tabBtn,...(tab===t.id?S.tabOn:{})}}>
            <Ic n={t.icon} sz={17} c={tab===t.id?"#00C9A7":"#475569"}/>
            <span style={{fontSize:9,fontWeight:700,color:tab===t.id?"#00C9A7":"#475569"}}>{t.label}</span>
            {t.id==="members"&&selected.length>0&&<span style={S.tbadge}>{selected.length}</span>}
          </button>
        ))}
      </nav>

      <main style={S.main}>

        {/* ════ 참가자 탭 ════ */}
        {tab==="members"&&<div className="fade">
          {/* 신규 추가 */}
          <div style={S.card}>
            <div style={S.cardT}>신규 참가자 추가</div>
            <div style={{display:"flex",gap:6,marginBottom:8}}>
              <input style={{...S.inp,flex:2}} placeholder="이름 *" value={cName}
                onChange={e=>setCName(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addMember()}/>
              <input style={{...S.inp,flex:"0 0 70px",textAlign:"center"}} placeholder="출생년도"
                type="number" min="0" max="99" value={cAge}
                onChange={e=>setCAge(e.target.value)} onKeyDown={e=>e.key==="Enter"&&addMember()}/>
              <button onClick={addMember} style={S.addBtn}><Ic n="plus" sz={18} c="#080d1a"/></button>
            </div>
            <div style={{fontSize:10,color:"#475569"}}>출생년도 끝 2자리 (예: 1974년생 → 74) · 미입력 시 74년생</div>
          </div>

          {/* 선택된 참가자 */}
          {selected.length>0&&(
            <div style={S.card}>
              <div style={S.cardT}>
                선택된 참가자
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  <span style={S.cntBadge}>{selected.length}명</span>
                  <button onClick={()=>setSelected([])} style={S.clearBtn}>해제</button>
                </div>
              </div>
              {selected.length>=4&&(
                <div style={{marginBottom:10}}>
                  <div style={{display:"flex",gap:3,height:4,borderRadius:4,overflow:"hidden",marginBottom:6}}>
                    {ageDist.map(g=><div key={g.label} style={{flex:g.cnt||.05,background:g.cnt?g.color:"rgba(255,255,255,.04)",transition:"flex .4s"}}/>)}
                  </div>
                  <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                    {ageDist.filter(g=>g.cnt>0).map(g=>(
                      <div key={g.label} style={{display:"flex",alignItems:"center",gap:4,fontSize:10,color:"#64748b"}}>
                        <div style={{width:6,height:6,borderRadius:"50%",background:g.color}}/>{g.label} {g.cnt}명
                      </div>
                    ))}
                  </div>
                </div>
              )}
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {selected.map(p=><button key={p} onClick={()=>toggle(p)} style={S.selChip}>{p} ✕</button>)}
              </div>
            </div>
          )}

          {/* 전체 회원 목록 */}
          <div style={S.card}>
            <div style={S.cardT}>
              전체 회원 <span style={{color:"#334155",fontWeight:600}}>({members.length}명)</span>
              <button onClick={()=>setSelected(members.map(m=>m.name))} style={S.clearBtn}>전체 선택</button>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              {members.map(m=>{
                const on=selected.includes(m.name); const ag=getAgeGroup(m.birthYear);
                return(
                  <div key={m.id} style={{...S.mRow,...(on?S.mRowOn:{})}}>
                    <div onClick={()=>toggle(m.name)} style={{...S.chkBox,...(on?S.chkBoxOn:{})}}>
                      {on&&<Ic n="check" sz={12} c="#080d1a"/>}
                    </div>
                    <button onClick={()=>toggle(m.name)} style={S.mInfo}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={S.mName}>{m.name}</span>
                        <button onClick={e=>{e.stopPropagation();setConfirmDel(m.id);}} style={S.delInline}>✕</button>
                        <span style={{...S.tag,background:ag.bg,color:ag.color}}>{ag.label}</span>
                      </div>
                      <div style={{fontSize:10,color:"#475569",marginTop:2}}>{m.birthYear}년생 · 승률 {m.winRate}% ({m.wins}/{m.total})</div>
                    </button>
                    <button onClick={()=>setEditM({...m})} style={S.editBtn}><Ic n="edit" sz={14} c="#475569"/></button>
                  </div>
                );
              })}
            </div>
          </div>
        </div>}

        {/* ════ 설정 탭 ════ */}
        {tab==="setup"&&<div className="fade">
          {/* 코트 수 */}
          <div style={S.card}>
            <div style={S.cardT}>코트 수 <span style={S.valBadge}>{courtCount===0?"자동":courtCount+"코트"}</span></div>
            <div style={{fontSize:11,color:"#475569",marginBottom:11}}>자동: 참가 인원 ÷ 4</div>
            <div style={{display:"flex",gap:7}}>
              {[0,3,4,5].map(n=>(
                <button key={n} onClick={()=>setCourtCount(n)} style={{...S.gameBtn,...(courtCount===n?S.gameBtnOn:{})}}>
                  <span style={{fontSize:n===0?13:20,fontWeight:900,color:courtCount===n?"#00C9A7":"#475569"}}>{n===0?"AUTO":n}</span>
                  <span style={{fontSize:9,fontWeight:700,color:courtCount===n?"#00C9A7":"#475569"}}>{n===0?"자동":n+"코트"}</span>
                </button>
              ))}
            </div>
            {courtCount>0&&selected.length>0&&courtCount>maxCourts&&(
              <div style={{marginTop:9,padding:"7px 10px",background:"rgba(255,107,107,.06)",border:"1px solid rgba(255,107,107,.2)",borderRadius:8,fontSize:11,color:"#FF6B6B"}}>
                ⚠️ {selected.length}명으로 {courtCount}코트 불가 → {maxCourts}코트로 자동 조정
              </div>
            )}
          </div>

          {/* 게임 수 */}
          <div style={S.card}>
            <div style={S.cardT}>게임 수 <span style={S.valBadge}>{gameCount}게임</span></div>
            <div style={{fontSize:11,color:"#475569",marginBottom:11}}>선수 1인당 참여하는 총 라운드 수</div>
            <div style={{display:"flex",gap:7}}>
              {[3,4,5,6].map(n=>(
                <button key={n} onClick={()=>setGameCount(n)} style={{...S.gameBtn,...(gameCount===n?S.gameBtnOn:{})}}>
                  <span style={{fontSize:20,fontWeight:900,color:gameCount===n?"#00C9A7":"#475569"}}>{n}</span>
                  <span style={{fontSize:9,fontWeight:700,color:gameCount===n?"#00C9A7":"#475569"}}>게임</span>
                  <span style={{fontSize:9,color:"#334155"}}>≈{n*15}분</span>
                </button>
              ))}
            </div>
            {selected.length>=4&&(
              <div style={{marginTop:10,padding:"8px 11px",background:"rgba(0,201,167,.04)",border:"1px solid rgba(0,201,167,.12)",borderRadius:8,fontSize:11,color:"#64748b",lineHeight:1.7}}>
                {selected.length}명 · {courts}코트{courtCount===0?" (자동)":""} · {gameCount}라운드<br/>
                → 총 <b style={{color:"#00C9A7"}}>{courts*gameCount}경기</b> / 1인당 <b style={{color:"#00C9A7"}}>{gameCount}게임</b>
              </div>
            )}
          </div>

          {/* 복식 조 구성 */}
          <div style={S.card}>
            <div style={S.cardT}>복식 조 구성 방식</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:11}}>
              {PAIR_MODES.map(mode=>(
                <button key={mode.id} onClick={()=>setPairMode(mode.id)} style={{...S.modeBtn,...(pairMode===mode.id?S.modeBtnOn:{})}}>
                  <span style={{fontSize:26}}>{mode.icon}</span>
                  <span style={{fontSize:12,fontWeight:900,color:pairMode===mode.id?"#00C9A7":"#e2e8f0"}}>{mode.label}</span>
                  <span style={{fontSize:10,color:"#64748b",textAlign:"center",lineHeight:1.4}}>{mode.desc}</span>
                  {pairMode===mode.id&&<div style={{width:5,height:5,borderRadius:"50%",background:"#00C9A7",marginTop:2}}/>}
                </button>
              ))}
            </div>
            <div style={{padding:"10px 12px",background:"rgba(0,201,167,.04)",border:"1px solid rgba(0,201,167,.13)",borderRadius:9,fontSize:11,color:"#64748b",lineHeight:1.7}}>
              <span style={{color:"#00C9A7",fontWeight:800}}>{curMode?.icon} {curMode?.label}</span><br/>{curMode?.detail}
            </div>
            {(pairMode==="age_balance"||pairMode==="age_mix")&&selected.length>=4&&(
              <div style={{marginTop:10,padding:"10px 11px",background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.05)",borderRadius:9}}>
                <div style={{fontSize:10,color:"#475569",marginBottom:8,fontWeight:700}}>연령대 분포</div>
                <div style={{display:"flex",gap:7}}>
                  {ageDist.map(g=>(
                    <div key={g.label} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"7px 4px",border:"1px solid",borderColor:g.cnt?g.color:"rgba(255,255,255,.06)",borderRadius:8,background:g.cnt?g.bg:"transparent"}}>
                      <span style={{fontSize:18,fontWeight:900,color:g.cnt?g.color:"#334155"}}>{g.cnt}</span>
                      <span style={{fontSize:9,color:g.cnt?g.color:"#334155",fontWeight:700}}>{g.label}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {pairMode==="win_balance"&&selected.length>=4&&(
              <div style={{marginTop:10,padding:"10px 11px",background:"rgba(255,255,255,.02)",border:"1px solid rgba(255,255,255,.05)",borderRadius:9}}>
                <div style={{fontSize:10,color:"#475569",marginBottom:6,fontWeight:700}}>참가자 평균 승률</div>
                <div style={{fontSize:24,fontWeight:900,color:"#00C9A7"}}>
                  {Math.round(selected.reduce((s,n)=>s+(mmap[n]?.winRate||0),0)/selected.length)}%
                </div>
                <div style={{fontSize:10,color:"#475569",marginTop:2}}>
                  최저 {Math.min(...selected.map(n=>mmap[n]?.winRate||0))}% ~ 최고 {Math.max(...selected.map(n=>mmap[n]?.winRate||0))}%
                </div>
              </div>
            )}
          </div>

          <button onClick={generate} style={{...S.primBtn,opacity:selected.length<4?.45:1}}>
            🏸 대진표 생성 ({selected.length}명 · {gameCount}게임 · {curMode?.label})
          </button>
          {selected.length<4&&<div style={{textAlign:"center",fontSize:11,color:"#475569",marginTop:-4,marginBottom:12}}>참가자 탭에서 4명 이상 선택 후 시도해 주세요</div>}
        </div>}

        {/* ════ 대진표 탭 ════ */}
        {tab==="bracket"&&!schedule&&(
          <div style={S.empty}>
            <div style={{fontSize:52}}>🏸</div>
            <div style={S.emptyT}>대진표가 없습니다</div>
            <div style={S.emptyS}>참가자를 선택하고<br/>설정 탭에서 생성해 주세요</div>
            <button onClick={()=>setTab("setup")} style={S.primBtn}>⚙️ 설정 탭으로</button>
          </div>
        )}
        {tab==="bracket"&&schedule&&<div className="fade">
          <div style={S.card}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:11,fontWeight:700,color:"#64748b"}}>전체 진행률</span>
              <span style={{fontSize:13,fontWeight:900,color:"#00C9A7"}}>{done} / {total} 경기</span>
            </div>
            <div style={S.progBar}><div style={{...S.progFill,width:`${total?(done/total)*100:0}%`}}/></div>
            <div style={{display:"flex",gap:7,marginTop:9,flexWrap:"wrap"}}>
              <span style={S.chip}>🏟 {courts}코트</span>
              <span style={S.chip}>🔄 {gameCount}라운드</span>
              <span style={S.chip}>{curMode?.icon} {curMode?.label}</span>
            </div>
          </div>
          {schedule.map((round,ri)=>(
            <div key={ri} style={S.card}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
                <div style={S.rndBadge}>ROUND {ri+1}</div>
                <span style={{fontSize:11,color:"#475569"}}>{round.length}코트 동시 진행</span>
              </div>
              {round.map((match,ci)=>{
                const cc=COURT_COLORS[ci%COURT_COLORS.length];
                const sa=parseInt(match.scoreA),sb=parseInt(match.scoreB);
                const fin=!isNaN(sa)&&!isNaN(sb);
                const aWin=fin&&sa>sb,bWin=fin&&sb>sa;
                return(
                  <div key={ci} style={{...S.matchCard,borderLeftColor:cc,marginBottom:ci<round.length-1?10:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:5,marginBottom:9,flexWrap:"wrap"}}>
                      <span style={{...S.courtTag,background:cc+"1c",color:cc}}>COURT {match.court}</span>
                      {(pairMode==="age_balance"||pairMode==="age_mix")&&<span style={S.balTag}>나이합 {match.sumAgeA}:{match.sumAgeB}</span>}
                      {pairMode==="win_balance"&&<span style={S.balTag}>승률 {match.avgWrA}%:{match.avgWrB}%</span>}
                      {fin&&<span style={S.doneTag}>✓ 완료</span>}
                    </div>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <div style={{flex:1,opacity:bWin?.45:1}}>
                        <div style={{fontSize:8,fontWeight:800,color:"#475569",letterSpacing:".06em",marginBottom:5}}>팀 A {aWin&&"🏆"}</div>
                        {match.teamA.map(p=>{const m=mmap[p];return(
                          <div key={p} style={{marginBottom:4}}>
                            <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>{p}</div>
                            {m&&<div style={{fontSize:9,color:"#475569"}}>{m.birthYear}년생 · {m.winRate}%</div>}
                          </div>
                        );})}
                      </div>
                      <div style={{display:"flex",alignItems:"center",gap:4,flexShrink:0}}>
                        <input type="number" min="0" max="50" value={match.scoreA}
                          onChange={e=>updScore(ri,ci,"A",e.target.value)}
                          style={{...S.scoreInp,...(aWin?S.winInp:bWin?S.loseInp:{})}} placeholder="0"/>
                        <span style={{color:"#334155",fontWeight:900,fontSize:14}}>:</span>
                        <input type="number" min="0" max="50" value={match.scoreB}
                          onChange={e=>updScore(ri,ci,"B",e.target.value)}
                          style={{...S.scoreInp,...(bWin?S.winInp:aWin?S.loseInp:{})}} placeholder="0"/>
                      </div>
                      <div style={{flex:1,textAlign:"right",opacity:aWin?.45:1}}>
                        <div style={{fontSize:8,fontWeight:800,color:"#475569",letterSpacing:".06em",marginBottom:5}}>{bWin&&"🏆"} 팀 B</div>
                        {match.teamB.map(p=>{const m=mmap[p];return(
                          <div key={p} style={{marginBottom:4}}>
                            <div style={{fontSize:13,fontWeight:700,color:"#e2e8f0"}}>{p}</div>
                            {m&&<div style={{fontSize:9,color:"#475569"}}>{m.birthYear}년생 · {m.winRate}%</div>}
                          </div>
                        );})}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          ))}
          <button onClick={doRank} style={S.primBtn}>🏆 순위 집계하기</button>
        </div>}

        {/* ════ 순위 탭 ════ */}
        {tab==="ranking"&&rankings.length===0&&(
          <div style={S.empty}>
            <div style={{fontSize:52}}>🏆</div>
            <div style={S.emptyT}>아직 순위 없음</div>
            <div style={S.emptyS}>대진표에서 점수 입력 후<br/>순위 집계 버튼을 누르세요</div>
            <button onClick={()=>setTab("bracket")} style={S.primBtn}>대진표 보러 가기</button>
          </div>
        )}
        {tab==="ranking"&&rankings.length>0&&<div className="fade">
          <div style={{display:"flex",alignItems:"flex-end",justifyContent:"center",gap:6,marginBottom:14,padding:"0 4px"}}>
            {[rankings[1],rankings[0],rankings[2]].map((p,i)=>{
              if(!p)return<div key={i} style={{flex:1}}/>;
              const mc=medalColor(p.rank);const hs=[110,148,92];
              return(
                <div key={p.name} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center"}}>
                  <div style={{fontSize:28,marginBottom:4}}>{"🥈🥇🥉"[i]}</div>
                  <div style={{fontSize:12,fontWeight:900,color:"#e2e8f0",textAlign:"center",marginBottom:2}}>{p.name}</div>
                  {p.birthYear&&<div style={{fontSize:9,color:"#64748b",marginBottom:4}}>{p.birthYear}년생 · {getAgeGroup(p.birthYear).label}</div>}
                  <div style={{width:"100%",height:hs[i],background:mc+"12",border:"1px solid "+mc+"40",borderRadius:"7px 7px 0 0",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2}}>
                    <span style={{fontSize:16,fontWeight:900,color:mc}}>{p.rank}위</span>
                    <span style={{fontSize:10,color:"#94a3b8"}}>{p.wins}승 {p.losses}패</span>
                  </div>
                </div>
              );
            })}
          </div>
          <div style={S.card}>
            <div style={S.cardT}>전체 순위표</div>
            <div style={{display:"grid",gridTemplateColumns:"30px 1fr 28px 28px 38px 42px",gap:3,padding:"4px 6px 8px",fontSize:9,fontWeight:700,color:"#334155",textTransform:"uppercase",letterSpacing:".04em",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
              <span>#</span><span>이름</span><span>승</span><span>패</span><span>점수</span><span>이번승률</span>
            </div>
            {rankings.map(p=>{
              const wr=p.games>0?Math.round((p.wins/p.games)*100):0;
              const mc=medalColor(p.rank);const ag=p.birthYear?getAgeGroup(p.birthYear):null;
              return(
                <div key={p.name} style={{display:"grid",gridTemplateColumns:"30px 1fr 28px 28px 38px 42px",gap:3,padding:"10px 6px",borderRadius:8,fontSize:12,borderBottom:"1px solid rgba(255,255,255,.03)",background:p.rank<=3?mc+"0e":"transparent"}}>
                  <span style={{fontWeight:900,color:mc,fontSize:14}}>{p.rank<=3?["🥇","🥈","🥉"][p.rank-1]:p.rank}</span>
                  <div>
                    <div style={{fontWeight:700,color:"#e2e8f0",fontSize:13}}>{p.name}</div>
                    {ag&&<div style={{fontSize:9,color:"#475569"}}>{p.birthYear}년생 · {ag.label}</div>}
                  </div>
                  <span style={{color:"#00C9A7",fontWeight:800}}>{p.wins}</span>
                  <span style={{color:"#FF6B6B"}}>{p.losses}</span>
                  <span style={{color:"#94a3b8"}}>{p.pts}</span>
                  <span style={{color:"#FFE66D",fontWeight:700}}>{wr}%</span>
                </div>
              );
            })}
          </div>
          <button onClick={resetAll} style={{...S.primBtn,background:"linear-gradient(135deg,#FF6B6B,#FF9F43)"}}>
            새 게임 시작
          </button>
        </div>}
      </main>

      {/* 삭제 확인 모달 */}
      {confirmDel&&(()=>{
        const tgt=members.find(m=>m.id===confirmDel);
        return(
          <div style={S.modalBg} onClick={()=>setConfirmDel(null)}>
            <div style={S.modal} onClick={e=>e.stopPropagation()}>
              <div style={{fontSize:28,textAlign:"center",marginBottom:10}}>🗑️</div>
              <div style={{fontSize:15,fontWeight:900,color:"#e2e8f0",textAlign:"center",marginBottom:6}}>{tgt?.name} 삭제</div>
              <div style={{fontSize:12,color:"#64748b",textAlign:"center",lineHeight:1.6,marginBottom:20}}>
                회원 명단에서 완전히 삭제됩니다.<br/>이 작업은 되돌릴 수 없습니다.
              </div>
              <div style={{display:"flex",gap:8}}>
                <button onClick={()=>setConfirmDel(null)} style={{...S.clearBtn,flex:1,padding:"12px",borderRadius:9,textAlign:"center",fontSize:13}}>취소</button>
                <button onClick={()=>delMember(confirmDel)} style={{flex:2,background:"linear-gradient(135deg,#FF6B6B,#FF4444)",border:"none",borderRadius:9,padding:"12px",color:"#fff",fontSize:13,fontWeight:900,cursor:"pointer"}}>삭제</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* 수정 모달 */}
      {editM&&(
        <div style={S.modalBg} onClick={()=>setEditM(null)}>
          <div style={S.modal} onClick={e=>e.stopPropagation()}>
            <div style={{fontSize:16,fontWeight:900,color:"#e2e8f0",marginBottom:16}}>✏️ {editM.name} 정보 수정</div>
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,color:"#64748b",marginBottom:6,fontWeight:700}}>출생년도 끝 2자리 (예: 74)</div>
              <input type="number" min="0" max="99" value={editM.birthYear}
                onChange={e=>setEditM(p=>({...p,birthYear:e.target.value}))}
                style={{...S.inp,width:"100%",boxSizing:"border-box",flex:"none"}}/>
            </div>
            <div style={{marginBottom:18}}>
              <div style={{fontSize:11,color:"#64748b",marginBottom:6,fontWeight:700}}>누적 승률 (%)</div>
              <input type="number" min="0" max="100" value={editM.winRate}
                onChange={e=>setEditM(p=>({...p,winRate:e.target.value}))}
                style={{...S.inp,width:"100%",boxSizing:"border-box",flex:"none"}}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setEditM(null)} style={{...S.clearBtn,flex:1,padding:"12px",borderRadius:9,textAlign:"center"}}>취소</button>
              <button onClick={saveEdit} style={{...S.addBtn,flex:2,borderRadius:9,fontSize:14,fontWeight:900}}>저장 💾</button>
            </div>
          </div>
        </div>
      )}

      {/* 토스트 */}
      {toast.msg&&(
        <div className="toast" style={{background:toast.type==="err"?"rgba(255,107,107,.96)":"rgba(0,201,167,.96)"}}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("app")).render(<App/>);
</script>
</body>
</html>
